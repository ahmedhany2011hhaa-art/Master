<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>CRASH | MASTER CHEAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Cairo', sans-serif; text-align: center; }
        .chart { height: 200px; display: flex; align-items: flex-end; justify-content: center; font-size: 50px; font-weight: 900; color: #dc2626; }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between mb-10">
        <a href="index.html">🔙</a>
        <p id="bal" class="text-yellow-500 font-bold">0</p>
    </div>

    <div class="chart italic" id="multiplier">1.00x</div>
    <p class="text-zinc-500 mb-10">الارتفاع الحالي ✈️</p>

    <input type="number" id="bet" placeholder="مبلغ الرهان" class="w-full p-4 rounded-2xl bg-zinc-900 border border-white/10 mb-4 text-center outline-none">
    
    <button id="btn-start" onclick="startFly()" class="w-full p-5 rounded-2xl bg-red-600 font-black text-xl">ابدأ الإقلاع</button>
    <button id="btn-cash" onclick="cashout()" class="w-full p-5 rounded-2xl bg-green-600 font-black text-xl hidden">سحب الأرباح!</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyCd6mOpEJyiUSAAhmm2NbhT80MMY0UQJcc",
            databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com"
        }));

        const phone = localStorage.getItem('zeykor_phone');
        let multi = 1.0, timer, betVal = 0;

        onValue(ref(db, `master_cheat/users/${phone}`), s => document.getElementById('bal').innerText = s.val().balance);

        window.startFly = async () => {
            betVal = parseInt(document.getElementById('bet').value);
            const s = await get(ref(db, `master_cheat/users/${phone}`));
            if(s.val().balance < betVal) return alert("رصيد ناقص!");

            update(ref(db, `master_cheat/users/${phone}`), { balance: s.val().balance - betVal });
            
            document.getElementById('btn-start').classList.add('hidden');
            document.getElementById('btn-cash').classList.remove('hidden');
            
            multi = 1.0;
            const crashPoint = (Math.random() * 5 + 1).toFixed(2);
            
            timer = setInterval(() => {
                multi += 0.05;
                document.getElementById('multiplier').innerText = multi.toFixed(2) + "x";
                
                if(multi >= crashPoint) {
                    clearInterval(timer);
                    document.getElementById('multiplier').innerText = "BOOM! 💥";
                    document.getElementById('multiplier').style.color = "gray";
                    setTimeout(() => location.reload(), 2000);
                }
            }, 100);
        };

        window.cashout = async () => {
            clearInterval(timer);
            const win = Math.floor(betVal * multi);
            const s = await get(ref(db, `master_cheat/users/${phone}`));
            await update(ref(db, `master_cheat/users/${phone}`), { balance: s.val().balance + win });
            alert("ربحت: " + win);
            location.reload();
        };
    </script>
</body>
</html>
