<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOGIN | MASTER X ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { background: #030303; color: white; font-family: 'Cairo', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #030303; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s ease; }
        .loader { width: 60px; height: 60px; border: 4px solid rgba(220,38,38,0.2); border-top: 4px solid #dc2626; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .container { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative; z-index: 10; overflow-y: auto; }
        .login-card { background: rgba(10,10,10,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 3rem; padding: 2.5rem 2rem; width: 100%; max-width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .login-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(220,38,38,0.1) 0%, transparent 70%); animation: rotate 20s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .logo { text-align: center; margin-bottom: 2rem; position: relative; z-index: 10; }
        .logo-icon { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(145deg, #dc2626, #b91c1c); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 3rem; box-shadow: 0 0 30px rgba(220,38,38,0.5); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .logo-text { font-size: 2rem; font-weight: 900; background: linear-gradient(45deg, #dc2626, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 2px; }
        .logo-sub { color: #666; font-size: 0.8rem; margin-top: 0.5rem; }
        .form-group { margin-bottom: 1.5rem; position: relative; z-index: 10; }
        .input-label { display: block; margin-bottom: 0.5rem; color: #999; font-size: 0.9rem; font-weight: 600; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; right: 20px; color: #666; font-size: 1.2rem; z-index: 10; transition: all 0.3s; }
        .form-input { width: 100%; background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.05); border-radius: 2rem; padding: 1.2rem 3rem 1.2rem 1.5rem; color: white; font-size: 1rem; outline: none; transition: all 0.3s; font-family: 'Cairo', sans-serif; }
        .form-input:focus { border-color: #dc2626; background: rgba(220,38,38,0.05); box-shadow: 0 0 20px rgba(220,38,38,0.2); }
        .form-input::placeholder { color: #444; font-size: 0.9rem; }
        .password-toggle { position: absolute; left: 20px; color: #666; font-size: 1.2rem; cursor: pointer; transition: all 0.3s; z-index: 10; }
        .password-toggle:hover { color: #dc2626; }
        .form-options { display: flex; align-items: center; justify-content: space-between; margin: 1.5rem 0; position: relative; z-index: 10; }
        .remember-me { display: flex; align-items: center; gap: 8px; color: #999; font-size: 0.9rem; cursor: pointer; }
        .remember-me input { width: 18px; height: 18px; accent-color: #dc2626; cursor: pointer; }
        .forgot-password { color: #dc2626; font-size: 0.9rem; text-decoration: none; cursor: pointer; }
        .login-btn { width: 100%; background: linear-gradient(145deg, #dc2626, #b91c1c); color: white; border: none; border-radius: 2rem; padding: 1.2rem; font-weight: 900; font-size: 1.2rem; cursor: pointer; transition: all 0.3s; position: relative; z-index: 10; overflow: hidden; margin-bottom: 1.5rem; box-shadow: 0 10px 20px rgba(220,38,38,0.3); }
        .login-btn:hover { transform: translateY(-2px); }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .signup-link { text-align: center; margin-top: 1.5rem; position: relative; z-index: 10; }
        .signup-link p { color: #666; font-size: 0.9rem; }
        .signup-link a { color: #dc2626; font-weight: bold; text-decoration: none; margin-right: 5px; }
        .error-message { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3); border-radius: 1rem; padding: 1rem; margin-bottom: 1.5rem; color: #dc2626; font-size: 0.9rem; text-align: center; display: none; position: relative; z-index: 10; }
        .error-message.show { display: block; animation: shake 0.5s ease; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 10px; }
        .guest-login { text-align: center; margin-top: 1rem; position: relative; z-index: 10; }
        .guest-login button { background: transparent; border: none; color: #666; font-size: 0.8rem; cursor: pointer; text-decoration: underline; }
        .guest-login button:hover { color: #dc2626; }
        .social-login { text-align: center; margin: 1.5rem 0; position: relative; z-index: 10; }
        .social-login p { color: #666; font-size: 0.8rem; margin-bottom: 1rem; }
        .social-icons { display: flex; justify-content: center; gap: 1rem; }
        .social-icon { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; cursor: pointer; transition: all 0.3s; }
        .social-icon:hover { transform: translateY(-5px); border-color: #dc2626; background: rgba(220,38,38,0.1); }
        .features { display: flex; justify-content: center; gap: 1rem; margin-top: 2rem; position: relative; z-index: 10; }
        .feature { text-align: center; color: #666; font-size: 0.7rem; }
        .feature i { color: #dc2626; font-size: 1rem; margin-bottom: 0.3rem; display: block; }
    </style>
</head>
<body>
    <div id="loading-screen"><div class="loader"></div></div>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <div class="logo-text">MASTER X</div>
                <div class="logo-sub">ELITE EDITION</div>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle ml-2"></i>
                <span id="errorText">خطأ في تسجيل الدخول</span>
            </div>

            <div class="form-group">
                <label class="input-label">رقم الهاتف</label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" class="form-input" placeholder="أدخل رقم هاتفك" dir="ltr">
                    <i class="fas fa-phone-alt input-icon"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="input-label">كلمة السر</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="أدخل كلمة السر" onkeypress="if(event.key==='Enter') login()">
                    <i class="fas fa-lock input-icon"></i>
                    <i class="fas fa-eye password-toggle" id="togglePassword" onclick="togglePassword()"></i>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>تذكرني</span>
                </label>
                <span class="forgot-password" onclick="forgotPassword()">نسيت كلمة السر؟</span>
            </div>

            <button class="login-btn" id="loginBtn" onclick="login()">
                <span id="btnText">تسجيل الدخول</span>
                <span id="btnSpinner" style="display:none;"><span class="spinner"></span></span>
            </button>

            <div class="social-login">
                <p>أو الدخول باستخدام</p>
                <div class="social-icons">
                    <div class="social-icon" onclick="socialLogin('google')"><i class="fab fa-google"></i></div>
                    <div class="social-icon" onclick="socialLogin('facebook')"><i class="fab fa-facebook-f"></i></div>
                    <div class="social-icon" onclick="socialLogin('twitter')"><i class="fab fa-twitter"></i></div>
                </div>
            </div>

            <div class="signup-link">
                <p>ليس لديك حساب؟ <a href="signup.html">إنشاء حساب جديد</a></p>
            </div>

            <div class="guest-login">
                <button onclick="guestLogin()">الدخول كضيف</button>
            </div>

            <div class="features">
                <div class="feature"><i class="fas fa-shield-alt"></i>آمن</div>
                <div class="feature"><i class="fas fa-bolt"></i>سريع</div>
                <div class="feature"><i class="fas fa-headset"></i>دعم 24/7</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyCd6mOpEJyiUSAAhmm2NbhT80MMY0UQJcc",
            databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com"
        }));

        window.addEventListener('load', () => { setTimeout(() => { const ls=document.getElementById('loading-screen'); ls.style.opacity='0'; ls.style.visibility='hidden'; }, 500); });

        // Redirect if already logged in
        if(localStorage.getItem('zeykor_phone')) window.location.href = 'index.html';

        window.login = async () => {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            if(!phone || !password) { showError("الرجاء إدخال رقم الهاتف وكلمة السر"); return; }
            const btn = document.getElementById('loginBtn');
            document.getElementById('btnText').style.display = 'none';
            document.getElementById('btnSpinner').style.display = 'inline';
            btn.disabled = true;
            try {
                const snap = await get(ref(db, `master_cheat/users/${phone}`));
                if(!snap.exists()) { showError("❌ الحساب غير موجود. سجّل أولاً"); }
                else if(snap.val().password === password) {
                    localStorage.setItem('zeykor_phone', phone);
                    window.location.href = 'index.html';
                } else { showError("❌ كلمة السر غير صحيحة"); }
            } catch(e) { showError("❌ خطأ في الاتصال. حاول مرة أخرى"); }
            finally {
                document.getElementById('btnText').style.display = 'inline';
                document.getElementById('btnSpinner').style.display = 'none';
                btn.disabled = false;
            }
        };

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            const el = document.getElementById('errorMessage');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        window.togglePassword = () => {
            const input = document.getElementById('password');
            const icon = document.getElementById('togglePassword');
            if(input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash password-toggle'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye password-toggle'; }
        };

        window.forgotPassword = () => { alert('تواصل مع الدعم الفني لاستعادة كلمة السر.'); };
        window.guestLogin = () => { localStorage.setItem('zeykor_phone', 'guest_' + Date.now()); window.location.href = 'index.html'; };
        window.socialLogin = (p) => { alert('تسجيل الدخول بـ ' + p + ' قريباً!'); };

        // BG Canvas
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCv() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCv();
        window.addEventListener('resize', resizeCv);
        const pts = Array.from({length: 60}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-.5)*.5, vy: (Math.random()-.5)*.5, r: Math.random()*2+0.5 }));
        (function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(220,38,38,0.15)'; ctx.fill();
            });
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
