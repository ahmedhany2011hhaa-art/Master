<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOGIN | MASTER X ELITE</title>
    
    <!-- Tailwind + Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            background: #030303;
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #030303;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(220, 38, 38, 0.2);
            border-top: 4px solid #dc2626;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        
        /* Main Container */
        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        
        /* Login Card */
        .login-card {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(220,38,38,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            z-index: 10;
        }
        
        .logo-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(145deg, #dc2626, #b91c1c);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 3rem;
            box-shadow: 0 0 30px rgba(220,38,38,0.5);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .logo-text {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, #dc2626, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        
        .logo-sub {
            color: #666;
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        
        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
            z-index: 10;
        }
        
        .input-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #999;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-icon {
            position: absolute;
            right: 20px;
            color: #666;
            font-size: 1.2rem;
            z-index: 10;
            transition: all 0.3s;
        }
        
        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 1.2rem 3rem 1.2rem 1.5rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        
        .form-input:focus {
            border-color: #dc2626;
            background: rgba(220,38,38,0.05);
            box-shadow: 0 0 20px rgba(220,38,38,0.2);
        }
        
        .form-input:focus + .input-icon {
            color: #dc2626;
            transform: scale(1.1);
        }
        
        .form-input::placeholder {
            color: #444;
            font-size: 0.9rem;
        }
        
        /* Password Visibility Toggle */
        .password-toggle {
            position: absolute;
            left: 20px;
            color: #666;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
        }
        
        .password-toggle:hover {
            color: #dc2626;
        }
        
        /* Remember Me & Forgot Password */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 1.5rem 0;
            position: relative;
            z-index: 10;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #999;
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: #dc2626;
            cursor: pointer;
        }
        
        .forgot-password {
            color: #dc2626;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .forgot-password:hover {
            color: #f97316;
            text-decoration: underline;
        }
        
        /* Login Button */
        .login-btn {
            width: 100%;
            background: linear-gradient(145deg, #dc2626, #b91c1c);
            color: white;
            border: none;
            border-radius: 2rem;
            padding: 1.2rem;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 10;
            overflow: hidden;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 20px rgba(220,38,38,0.3);
        }
        
        .login-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .login-btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(220,38,38,0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        /* Social Login */
        .social-login {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
            z-index: 10;
        }
        
        .social-login p {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            position: relative;
        }
        
        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: rgba(255,255,255,0.05);
        }
        
        .social-login p::before {
            left: 0;
        }
        
        .social-login p::after {
            right: 0;
        }
        
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        
        .social-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .social-icon:hover {
            transform: translateY(-5px);
            border-color: #dc2626;
            background: rgba(220,38,38,0.1);
        }
        
        .social-icon.google:hover { color: #ea4335; border-color: #ea4335; }
        .social-icon.facebook:hover { color: #1877f2; border-color: #1877f2; }
        .social-icon.twitter:hover { color: #1da1f2; border-color: #1da1f2; }
        
        /* Sign Up Link */
        .signup-link {
            text-align: center;
            margin-top: 1.5rem;
            position: relative;
            z-index: 10;
        }
        
        .signup-link p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .signup-link a {
            color: #dc2626;
            font-weight: bold;
            text-decoration: none;
            margin-right: 5px;
            transition: all 0.3s;
        }
        
        .signup-link a:hover {
            color: #f97316;
            text-decoration: underline;
        }
        
        /* Error Message */
        .error-message {
            background: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.3);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #dc2626;
            font-size: 0.9rem;
            text-align: center;
            display: none;
            position: relative;
            z-index: 10;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .error-message.show {
            display: block;
        }
        
        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        /* Guest Login */
        .guest-login {
            text-align: center;
            margin-top: 1rem;
            position: relative;
            z-index: 10;
        }
        
        .guest-login button {
            background: transparent;
            border: none;
            color: #666;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: underline;
        }
        
        .guest-login button:hover {
            color: #dc2626;
        }
        
        /* Features List */
        .features {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            position: relative;
            z-index: 10;
        }
        
        .feature {
            text-align: center;
            color: #666;
            font-size: 0.7rem;
        }
        
        .feature i {
            color: #dc2626;
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader"></div>
    </div>

    <!-- Animated Background -->
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="login-card" data-aos="fade-up">
            <!-- Logo -->
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="logo-text">MASTER X</div>
                <div class="logo-sub">ELITE EDITION</div>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle ml-2"></i>
                <span id="errorText">خطأ في تسجيل الدخول</span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="event.preventDefault(); login();">
                <!-- Phone Number -->
                <div class="form-group">
                    <label class="input-label">رقم الهاتف</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone-alt input-icon"></i>
                        <input type="tel" id="phone" class="form-input" placeholder="أدخل رقم هاتفك" dir="ltr" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="input-label">كلمة السر</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" class="form-input" placeholder="أدخل كلمة السر" required>
                        <i class="fas fa-eye password-toggle" id="togglePassword" onclick="togglePassword()"></i>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>تذكرني</span>
                    </label>
                    <a href="#" class="forgot-password" onclick="forgotPassword()">نسيت كلمة السر؟</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="btnText">تسجيل الدخول</span>
                    <span id="btnSpinner" style="display: none;"><span class="spinner"></span></span>
                </button>

                <!-- Social Login -->
                <div class="social-login">
                    <p>أو الدخول باستخدام</p>
                    <div class="social-icons">
                        <div class="social-icon google" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i>
                        </div>
                        <div class="social-icon facebook" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook-f"></i>
                        </div>
                        <div class="social-icon twitter" onclick="socialLogin('twitter')">
                            <i class="fab fa-twitter"></i>
                        </div>
                    </div>
                </div>

                <!-- Sign Up Link -->
                <div class="signup-link">
                    <p>
                        ليس لديك حساب؟
                        <a href="signup.html">إنشاء حساب جديد</a>
                    </p>
                </div>

                <!-- Guest Login -->
                <div class="guest-login">
                    <button onclick="guestLogin()">الدخول كضيف</button>
                </div>
            </form>

            <!-- Features -->
            <div class="features">
                <div class="feature" data-aos="fade-up" data-aos-delay="100">
                    <i class="fas fa-shield-alt"></i>
                    <div>آمن</div>
                </div>
                <div class="feature" data-aos="fade-up" data-aos-delay="200">
                    <i class="fas fa-bolt"></i>
                    <div>سريع</div>
                </div>
                <div class="feature" data-aos="fade-up" data-aos-delay="300">
                    <i class="fas fa-headset"></i>
                    <div>دعم 24/7</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal" id="forgotModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-key"></i>
            </div>
            <h2 class="text-xl font-black text-center mb-2">استعادة كلمة السر</h2>
            <p class="text-center text-zinc-400 mb-4">أدخل رقم هاتفك لإرسال رمز التحقق</p>
            <input type="tel" id="resetPhone" class="settings-input w-full mb-4" placeholder="رقم الهاتف">
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="hideForgotModal()">إلغاء</button>
                <button class="modal-btn confirm" onclick="sendResetCode()">إرسال</button>
            </div>
        </div>
    </div>

    <style>
        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 3rem;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(220,38,38,0.3);
            animation: modalAppear 0.3s ease;
        }
        
        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .modal-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #dc2626;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 aut
