<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MASTER X | Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:#050505;color:white;font-family:'Cairo',sans-serif;}</style>
</head>
<body class="p-4">
    <h1 class="text-xl font-black text-yellow-500 mb-6 italic">قائمة العمالقة 🏆</h1>
    
    <div id="leader-list" class="space-y-3">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyCd6mOpEJyiUSAAhmm2NbhT80MMY0UQJcc",
            databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com"
        }));

        onValue(ref(db, 'master_cheat/users'), snap => {
            const list = document.getElementById('leader-list');
            let users = [];
            snap.forEach(u => { users.push(u.val()); });
            users.sort((a, b) => b.balance - a.balance); // ترتيب تنازلي

            list.innerHTML = "";
            users.slice(0, 10).forEach((u, index) => {
                list.innerHTML += `
                    <div class="bg-zinc-900/50 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                        <div class="flex items-center gap-3">
                            <span class="text-red-600 font-black">#${index+1}</span>
                            <p class="text-sm font-bold">${u.nick}</p>
                        </div>
                        <p class="text-yellow-500 font-black text-xs">${u.balance} 🪙</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
