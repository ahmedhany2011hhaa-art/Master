<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEADERBOARD | MASTER X ELITE</title>
    
    <!-- Tailwind + Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            background: #030303;
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #030303;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(220, 38, 38, 0.2);
            border-top: 4px solid #dc2626;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Main Container */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 1rem;
            padding-bottom: 100px;
            position: relative;
            z-index: 10;
        }
        
        /* Header */
        .glass-header {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        /* Podium */
        .podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 10px;
            margin: 40px 0 30px;
            padding: 20px 10px;
            background: linear-gradient(180deg, rgba(220,38,38,0.1) 0%, transparent 100%);
            border-radius: 3rem;
        }
        
        .podium-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: all 0.3s;
        }
        
        .podium-item:hover {
            transform: translateY(-10px);
        }
        
        .podium-1 {
            transform: scale(1.1);
            z-index: 10;
        }
        
        .podium-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border: 3px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .podium-1 .podium-avatar {
            border-color: #eab308;
            box-shadow: 0 0 30px rgba(234,179,8,0.5);
        }
        
        .podium-2 .podium-avatar {
            border-color: #94a3b8;
            box-shadow: 0 0 30px rgba(148,163,184,0.5);
        }
        
        .podium-3 .podium-avatar {
            border-color: #b45309;
            box-shadow: 0 0 30px rgba(180,83,9,0.5);
        }
        
        .podium-rank {
            position: absolute;
            top: -10px;
            right: -5px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #dc2626;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 0.9rem;
            border: 2px solid white;
        }
        
        .podium-1 .podium-rank {
            background: #eab308;
        }
        
        .podium-2 .podium-rank {
            background: #94a3b8;
        }
        
        .podium-3 .podium-rank {
            background: #b45309;
        }
        
        .podium-name {
            font-weight: bold;
            font-size: 0.9rem;
            margin: 5px 0;
        }
        
        .podium-score {
            font-size: 1rem;
            font-weight: 900;
            color: #eab308;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }
        
        .podium-bar {
            width: 100%;
            height: 100px;
            background: linear-gradient(180deg, rgba(220,38,38,0.2), rgba(220,38,38,0.05));
            border-radius: 30px 30px 0 0;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .podium-bar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shine 2s infinite;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .podium-1 .podium-bar {
            height: 150px;
            background: linear-gradient(180deg, #eab308, #b45309);
        }
        
        .podium-2 .podium-bar {
            height: 120px;
            background: linear-gradient(180deg, #94a3b8, #475569);
        }
        
        .podium-3 .podium-bar {
            height: 100px;
            background: linear-gradient(180deg, #b45309, #7b341e);
        }
        
        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 3rem;
            border: 1px solid rgba(255,255,255,0.03);
        }
        
        .filter-btn {
            flex: 1;
            padding: 12px;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .filter-btn.active {
            background: #dc2626;
            color: white;
            transform: scale(1.02);
        }
        
        .filter-btn i {
            font-size: 1rem;
        }
        
        /* Leaderboard List */
        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }
        
        .leaderboard-item {
            background: linear-gradient(145deg, rgba(20,20,20,0.8), rgba(10,10,10,0.9));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 2rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .leaderboard-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s ease;
        }
        
        .leaderboard-item:hover::before {
            left: 100%;
        }
        
        .leaderboard-item:hover {
            transform: translateX(-5px);
            border-color: rgba(220,38,38,0.3);
        }
        
        .leaderboard-item.top-1 {
            background: linear-gradient(145deg, rgba(234,179,8,0.1), rgba(20,20,20,0.9));
            border-right: 4px solid #eab308;
        }
        
        .leaderboard-item.top-2 {
            background: linear-gradient(145deg, rgba(148,163,184,0.1), rgba(20,20,20,0.9));
            border-right: 4px solid #94a3b8;
        }
        
        .leaderboard-item.top-3 {
            background: linear-gradient(145deg, rgba(180,83,9,0.1), rgba(20,20,20,0.9));
            border-right: 4px solid #b45309;
        }
        
        .rank-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
            color: #dc2626;
            border: 2px solid rgba(220,38,38,0.3);
        }
        
        .top-1 .rank-badge {
            background: #eab308;
            color: black;
            border-color: #eab308;
        }
        
        .top-2 .rank-badge {
            background: #94a3b8;
            color: black;
            border-color: #94a3b8;
        }
        
        .top-3 .rank-badge {
            background: #b45309;
            color: white;
            border-color: #b45309;
        }
        
        .player-info {
            flex: 1;
        }
        
        .player-name {
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .player-id {
            font-size: 0.6rem;
            color: #666;
            font-family: monospace;
        }
        
        .player-stats {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        
        .stat-tag {
            font-size: 0.6rem;
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 30px;
            color: #999;
        }
        
        .player-score {
            font-weight: 900;
            font-size: 1.2rem;
            color: #eab308;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .player-score i {
            font-size: 0.8rem;
            color: #666;
        }
        
        /* Medal Icons */
        .medal-1 { color: #eab308; }
        .medal-2 { color: #94a3b8; }
        .medal-3 { color: #b45309; }
        
        /* Current User Card */
        .current-user-card {
            background: linear-gradient(145deg, #dc2626, #b91c1c);
            border-radius: 2rem;
            padding: 1.2rem;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(220,38,38,0.3);
        }
        
        .current-user-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }
        
        .current-user-content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .current-user-rank {
            font-size: 2rem;
            font-weight: 900;
            opacity: 0.5;
        }
        
        /* Stats Overview */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        
        .stat-box {
            background: rgba(20,20,20,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 1.5rem;
            padding: 1rem;
            text-align: center;
        }
        
        .stat-box-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: #dc2626;
        }
        
        .stat-box-label {
            font-size: 0.6rem;
            color: #666;
        }
        
        /* Crown Animation */
        .crown {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            animation: crownFloat 2s ease-in-out infinite;
        }
        
        @keyframes crownFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }
        
        /* Trophy Icon */
        .trophy-icon {
            font-size: 1rem;
            animation: trophySpin 3s linear infinite;
        }
        
        @keyframes trophySpin {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
        
        /* Navigation Bar */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            padding: 12px 8px;
            z-index: 1000;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
        }
        
        .nav-link {
            font-size: 10px;
            color: #666;
            text-align: center;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 30px;
            transition: all 0.3s;
        }
        
        .nav-link.active {
            color: #dc2626;
            background: rgba(220, 38, 38, 0.1);
            font-weight: bold;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 2rem;
            color: #666;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="glass-header flex justify-between items-center" data-aos="fade-down">
            <a href="index.html" class="text-2xl text-zinc-500 hover:text-red-600 transition-colors">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1 class="text-xl font-black">
                <span class="text-yellow-500">🏆</span>
                <span class="text-white">المتصدرين</span>
            </h1>
            <div class="w-10 h-10 rounded-full bg-red-600/20 flex items-center justify-center border border-red-600/30">
                <i class="fas fa-trophy text-yellow-500 text-sm"></i>
            </div>
        </div>

        <!-- Stats Overview -->
        <div class="stats-overview" data-aos="fade-up" data-aos-delay="100">
            <div class="stat-box">
                <div class="stat-box-value" id="totalPlayers">0</div>
                <div class="stat-box-label">إجمالي اللاعبين</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="totalGames">0</div>
                <div class="stat-box-label">إجمالي الألعاب</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-value" id="totalCoins">0</div>
                <div class="stat-box-label">إجمالي العملات</div>
            </div>
        </div>

        <!-- Podium (Top 3) -->
        <div class="podium" id="podium" data-aos="fade-up" data-aos-delay="200">
            <!-- Will be filled by JS -->
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs" data-aos="fade-up" data-aos-delay="250">
            <button class="filter-btn active" onclick="filterLeaderboard('global')">
                <i class="fas fa-globe"></i>
                عالمي
            </button>
            <button class="filter-btn" onclick="filterLeaderboard('monthly')">
                <i class="fas fa-calendar"></i>
                شهري
            </button>
            <button class="filter-btn" onclick="filterLeaderboard('weekly')">
                <i class="fas fa-clock"></i>
                أسبوعي
            </button>
            <button class="filter-btn" onclick="filterLeaderboard('daily')">
                <i class="fas fa-sun"></i>
                يومي
            </button>
        </div>

        <!-- Leaderboard List -->
        <div class="leaderboard-list" id="leaderboardList" data-aos="fade-up" data-aos-delay="300">
            <!-- Will be filled by JS -->
        </div>

        <!-- Current User Card -->
        <div class="current-user-card" id="currentUserCard" data-aos="fade-up" data-aos-delay="350">
            <!-- Will be filled by JS -->
        </div>
    </div>

    <!-- Navigation Bar -->
    <nav>
        <a href="index.html" class="nav-link">🏠<br>الرئيسية</a>
        <a href="games.html" class="nav-link">🎮<br>الألعاب</a>
        <a href="hacks.html" class="nav-link">🚀<br>الهاكات</a>
        <a href="leaderboard.html" class="nav-link active">🏆<br>الترتيب</a>
        <a href="settings.html" class="nav-link">⚙️<br>الإعدادات</a>
    </nav>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        // Initialize AOS
        AOS.init({
            duration: 800,
            once: true,
            offset: 50
        });

        // Hide loading screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                document.getElementById('loading-screen').style.visibility = 'hidden';
            }, 500);
        });

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Firebase Config
        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyCd6mOpEJyiUSAAhmm2NbhT80MMY0UQJcc",
            databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com"
        }));

        // Get current user
        const phone = localStorage.getItem('zeykor_phone');
        if(!phone) window.location.href = "login.html";

        let allUsers = [];
        let currentFilter = 'global';

        // Load leaderboard data
        onValue(ref(db, 'master_cheat/users'), (snap) => {
            allUsers = [];
            let totalCoins = 0;
            
            snap.forEach((user) => {
                const data = user.val();
                allUsers.push({
                    phone: user.key,
                    ...data
                });
                totalCoins += data.balance || 0;
            });

  
            // Update stats
            document.getElementById('totalPlayers').textContent = allUsers.length;
            document.getElementById('totalGames').textContent = allUsers.reduce((s,u) => s+(u.gamesPlayed||0), 0);
            document.getElementById('totalCoins').textContent = totalCoins;

            renderLeaderboard();
        });

        function renderLeaderboard() {
            const sorted = [...allUsers].sort((a, b) => (b.balance||0) - (a.balance||0));

            // Podium (top 3)
            const podium = document.getElementById('podium');
            const top3 = [sorted[1], sorted[0], sorted[2]].filter(Boolean);
            const podiumPos = ['podium-2', 'podium-1', 'podium-3'];
            const medals = ['🥈', '🥇', '🥉'];
            podium.innerHTML = top3.map((u, i) => `
                <div class="podium-item ${podiumPos[i]}">
                    ${i === 1 ? '<div class="crown">👑</div>' : ''}
                    <div class="podium-avatar">
                        ${medals[i]}
                        <div class="podium-rank">${i === 1 ? 1 : i === 0 ? 2 : 3}</div>
                    </div>
                    <div class="podium-name">${u.nick || 'User'}</div>
                    <div class="podium-score">${u.balance || 0} 🪙</div>
                    <div class="podium-bar"></div>
                </div>
            `).join('');

            // List
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';
            sorted.forEach((u, index) => {
                const topClass = index === 0 ? 'top-1' : index === 1 ? 'top-2' : index === 2 ? 'top-3' : '';
                const medalIcon = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '';
                list.innerHTML += `
                    <div class="leaderboard-item ${topClass}">
                        <div class="rank-badge">${medalIcon || (index+1)}</div>
                        <div class="player-info">
                            <div class="player-name">${u.nick || 'User'}</div>
                            <div class="player-id">${u.customID || 'ID-' + (u.phone||'').slice(-4)}</div>
                        </div>
                        <div class="player-score">${u.balance || 0} 🪙</div>
                    </div>`;
            });

            // Current user card
            const myIndex = sorted.findIndex(u => u.phone === phone);
            const myUser = sorted[myIndex];
            if(myUser) {
                document.getElementById('currentUserCard').innerHTML = `
                    <div class="current-user-content">
                        <div>
                            <div class="text-sm opacity-70">ترتيبك الحالي</div>
                            <div class="text-2xl font-black">${myUser.nick || 'أنت'}</div>
                            <div class="text-lg font-bold opacity-80">${myUser.balance || 0} 🪙</div>
                        </div>
                        <div class="current-user-rank">#${myIndex+1}</div>
                    </div>`;
            }
        }

        window.filterLeaderboard = (filter) => {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderLeaderboard();
        };
    </script>
</body>
</html>
