<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PLINKO | MASTER CHEAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; text-align: center; font-family: 'Cairo'; }
        .slot { display: inline-block; width: 40px; padding: 10px 0; margin: 2px; border-radius: 8px; font-weight: 900; font-size: 10px; }
    </style>
</head>
<body class="p-6">
    <h1 class="text-xl font-black mb-10 text-blue-500">PLINKO BOARD 🔵</h1>
    
    <div id="game-area" class="mb-10 p-4 bg-zinc-900 rounded-3xl min-h-[200px] flex items-center justify-center italic text-zinc-700">
        اضغط لرمي الكرة
    </div>

    <div class="flex justify-center mb-6">
        <div class="slot bg-red-600">0.2x</div>
        <div class="slot bg-orange-500">0.5x</div>
        <div class="slot bg-yellow-500">1.5x</div>
        <div class="slot bg-green-500">5.0x</div>
        <div class="slot bg-orange-500">0.5x</div>
        <div class="slot bg-red-600">0.2x</div>
    </div>

    <input type="number" id="bet" value="100" class="w-full bg-zinc-900 p-4 rounded-2xl mb-4 text-center outline-none">
    <button onclick="dropBall()" class="w-full p-5 rounded-2xl bg-blue-600 font-black">إسقاط الكرة</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, update, get } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyCd6mOpEJyiUSAAhmm2NbhT80MMY0UQJcc",
            databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com"
        }));

        const phone = localStorage.getItem('zeykor_phone');

        window.dropBall = async () => {
            const b = parseInt(document.getElementById('bet').value);
            const userRef = ref(db, `master_cheat/users/${phone}`);
            const s = await get(userRef);
            
            if(s.val().balance < b) return alert("لا يوجد رصيد");
            await update(userRef, { balance: s.val().balance - b });

            const area = document.getElementById('game-area');
            area.innerText = "🔵 جاري الإسقاط...";
            
            setTimeout(async () => {
                const results = [0.2, 0.5, 1.5, 5.0, 0.5, 0.2];
                const winMulti = results[Math.floor(Math.random()*results.length)];
                const totalWin = Math.floor(b * winMulti);
                
                area.innerHTML = `<span class="text-4xl text-white font-black">${winMulti}x</span>`;
                const s2 = await get(userRef);
                await update(userRef, { balance: s2.val().balance + totalWin });
            }, 1000);
        };
    </script>
</body>
</html>
