<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Mines | MASTER X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: white; text-align: center; font-family: 'Cairo', sans-serif; }
        .grid-box { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 20px auto; max-width: 350px; }
        .cell { aspect-ratio: 1; background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .cell.open { background: #222; border: 1px solid #444; }
        .cell.gem { background: #166534; }
        .cell.bomb { background: #991b1b; }
    </style>
</head>
<body class="p-4">
    <header class="flex justify-between p-4 bg-zinc-900 rounded-3xl mb-6">
        <a href="games.html">🔙</a>
        <p class="font-bold">الألغام 💣</p>
        <span id="bal">0</span>
    </header>

    <div class="mb-4">
        <input type="number" id="bet" placeholder="المبلغ" class="bg-zinc-900 p-3 rounded-xl w-1/2 text-center outline-none border border-white/10">
    </div>
    
    <div class="grid-box" id="grid"></div>

    <button id="start-btn" onclick="startGame()" class="bg-red-600 w-full p-4 rounded-2xl font-black mb-3">بدء اللعبة</button>
    <button id="cashout-btn" onclick="cashout()" class="bg-green-600 w-full p-4 rounded-2xl font-black hidden">سحب الأرباح (1.00x)</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyCd6mOpEJyiUSAAhmm2NbhT80MMY0UQJcc",
            databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com"
        }));

        const phone = localStorage.getItem('zeykor_phone');
        let bombs = [], opened = 0, currentBet = 0, multiplier = 1.0;

        // إنشاء المربعات
        const grid = document.getElementById('grid');
        for(let i=0; i<25; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.id = i;
            cell.onclick = () => reveal(i);
            grid.appendChild(cell);
        }

        window.startGame = async () => {
            currentBet = parseInt(document.getElementById('bet').value);
            if(isNaN(currentBet) || currentBet <= 0) return alert("حدد مبلغ!");
            
            const userRef = ref(db, `ZEYKOR/users/${phone}`);
            const snap = await get(userRef);
            if(snap.val().balance < currentBet) return alert("الرصيد لا يكفي!");

            update(userRef, { balance: snap.val().balance - currentBet });
            
            // توزيع 3 قنابل عشوائية
            bombs = [];
            while(bombs.length < 3) {
                let r = Math.floor(Math.random()*25);
                if(!bombs.includes(r)) bombs.push(r);
            }

            document.getElementById('start-btn').disabled = true;
            document.getElementById('cashout-btn').classList.remove('hidden');
            resetCells();
        };

        window.reveal = (i) => {
            if(bombs.length === 0) return;
            const cell = grid.children[i];
            if(cell.classList.contains('open')) return;

            if(bombs.includes(i)) {
                cell.classList.add('bomb'); cell.innerText = "💣";
                alert("خسرت! لمست لغماً.");
                location.reload();
            } else {
                cell.classList.add('gem'); cell.innerText = "💎";
                opened++;
                multiplier += 0.3;
                document.getElementById('cashout-btn').innerText = `سحب الأرباح (${multiplier.toFixed(2)}x)`;
            }
        };

        window.cashout = async () => {
            const profit = Math.floor(currentBet * multiplier);
            const userRef = ref(db, `ZEYKOR/users/${phone}`);
            const snap = await get(userRef);
            update(userRef, { balance: snap.val().balance + profit });
            alert(`مبروك! ربحت ${profit} عملة.`);
            location.reload();
        };

        function resetCells() { Array.from(grid.children).forEach(c => { c.className = 'cell'; c.innerText = ""; }); }
        onValue(ref(db, `ZEYKOR/users/${phone}`), s => document.getElementById('bal').innerText = s.val().balance);
    </script>
</body>
</html>
