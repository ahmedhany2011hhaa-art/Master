<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LINKS | MASTER X ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { background: #030303; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; min-height: 100vh; }
        #loading-screen { position: fixed; top:0;left:0;width:100%;height:100%; background:#030303; display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s,visibility .4s; }
        .loader { width:55px;height:55px;border:4px solid rgba(220,38,38,.15);border-top:4px solid #dc2626;border-radius:50%;animation:spin .9s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        #bg-canvas { position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.35;pointer-events:none; }
        .container { max-width:500px;margin:0 auto;padding:16px 16px 110px;position:relative;z-index:10; }
        .page-header { background:linear-gradient(145deg,rgba(220,38,38,.1),rgba(10,10,10,.9));border:1px solid rgba(220,38,38,.2);border-radius:1.75rem;padding:1.25rem;margin-bottom:1.1rem;position:relative;overflow:hidden; }
        .page-header::before { content:'';position:absolute;top:-40px;right:-40px;width:110px;height:110px;background:radial-gradient(circle,rgba(220,38,38,.2),transparent 70%);border-radius:50%; }
        .search-wrap { position:relative;margin-bottom:1.1rem; }
        .search-input { width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:1.5rem;color:white;padding:12px 18px 12px 44px;font-family:'Cairo',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s; }
        .search-input:focus { border-color:rgba(220,38,38,.4); }
        .search-input::placeholder { color:#444; }
        .s-icon { position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#444; }

        /* Link Cards */
        .link-card { background:linear-gradient(145deg,rgba(18,18,18,.96),rgba(8,8,8,.99));border:1px solid rgba(255,255,255,.04);border-radius:1.5rem;padding:15px;display:flex;align-items:center;gap:13px;transition:all .3s cubic-bezier(.175,.885,.32,1.275);cursor:pointer;position:relative;overflow:hidden; }
        .link-card::before { content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.03),transparent);transition:left .5s; }
        .link-card:hover::before { left:100%; }
        .link-card:hover { border-color:rgba(220,38,38,.22);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4); }
        .link-card:active { transform:scale(.98); }
        .link-card.locked { border-color:rgba(234,179,8,.15); }
        .link-card.locked:hover { border-color:rgba(234,179,8,.3); }

        .thumb { width:56px;height:56px;border-radius:.9rem;overflow:hidden;flex-shrink:0;background:#111;border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:1.7rem; }
        .thumb img { width:100%;height:100%;object-fit:cover; }
        .link-info { flex:1;min-width:0; }
        .link-title { font-weight:900;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px; }
        .link-desc { font-size:.72rem;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }

        .price-tag { display:flex;align-items:center;gap:4px;font-weight:900;font-size:.82rem;color:#fbbf24;white-space:nowrap; }
        .price-tag.free { color:#22c55e; }
        .price-tag.cant { color:#ef4444; }
        .action-icon { width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;transition:all .2s; }
        .action-open { background:rgba(220,38,38,.12); }
        .action-lock { background:rgba(234,179,8,.1); }
        .action-poor { background:rgba(239,68,68,.1); }
        .link-card:hover .action-open { background:rgba(220,38,38,.25);transform:scale(1.1); }

        /* Confirm Modal */
        .modal-bg { position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:9998;padding:20px; }
        .modal-bg.show { display:flex; }
        .modal-box { background:linear-gradient(145deg,#1a1a1a,#0e0e0e);border:1px solid rgba(220,38,38,.25);border-radius:2rem;padding:2rem;max-width:360px;width:100%;animation:popIn .25s ease; }
        @keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
        .modal-icon { width:72px;height:72px;border-radius:50%;background:#111;border:2px solid rgba(220,38,38,.3);display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 1rem; }
        .modal-title { font-weight:900;font-size:1.25rem;text-align:center;margin-bottom:.4rem; }
        .modal-price { font-size:1.6rem;font-weight:900;color:#fbbf24;text-align:center;margin:.8rem 0; }
        .modal-bal { font-size:.8rem;color:#555;text-align:center; }
        .modal-btns { display:flex;gap:10px;margin-top:1.5rem; }
        .btn-confirm { flex:1;padding:13px;border-radius:1rem;font-family:'Cairo',sans-serif;font-weight:900;font-size:.95rem;background:#dc2626;color:white;border:none;cursor:pointer;transition:all .2s; }
        .btn-confirm:hover { background:#b91c1c; }
        .btn-cancel { flex:1;padding:13px;border-radius:1rem;font-family:'Cairo',sans-serif;font-weight:700;font-size:.95rem;background:transparent;color:white;border:1px solid rgba(255,255,255,.1);cursor:pointer; }
        .btn-cancel:hover { background:rgba(255,255,255,.06); }

        /* Toast */
        .toast { position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#111;border:1px solid rgba(255,255,255,.07);color:white;padding:11px 22px;border-radius:2rem;font-weight:700;font-size:.82rem;z-index:9999;transition:transform .3s;white-space:nowrap; }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast.g { border-right:3px solid #22c55e; }
        .toast.r { border-right:3px solid #dc2626; }

        /* Skeleton */
        .skel { background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.07) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;animation:shim 1.4s infinite;border-radius:1.5rem;height:86px; }
        @keyframes shim { to{background-position:-200% 0} }

        /* Ads */
        .ad-strip { background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.04);border-radius:1.25rem;overflow:hidden;display:flex;justify-content:center;align-items:center;min-height:60px;margin:10px 0; }

        /* Nav */
        nav { position:fixed;bottom:0;left:0;right:0;background:rgba(5,5,5,.88);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-around;padding:12px 8px;z-index:1000; }
        .nav-link { font-size:10px;color:#555;text-align:center;text-decoration:none;padding:6px 12px;border-radius:30px;transition:all .3s; }
        .nav-link.active { color:#dc2626;background:rgba(220,38,38,.1);font-weight:bold; }

        .bal-chip { background:rgba(255,255,255,.04);border:1px solid rgba(234,179,8,.2);border-radius:2rem;padding:5px 14px;display:flex;align-items:center;gap:6px; }
        .cnt-badge { background:rgba(220,38,38,.12);color:#f87171;font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:2rem;border:1px solid rgba(220,38,38,.2); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div id="loading-screen"><div class="loader"></div></div>
    <div class="toast" id="toast"></div>

    <!-- Confirm Modal -->
    <div class="modal-bg" id="modal">
        <div class="modal-box">
            <div class="modal-icon" id="m-icon">🔗</div>
            <h2 class="modal-title" id="m-title">فتح اللينك</h2>
            <p style="text-align:center;font-size:.8rem;color:#555" id="m-desc"></p>
            <div class="modal-price" id="m-price">0 🪙</div>
            <p class="modal-bal" id="m-bal">رصيدك: 0 🪙</p>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
                <button class="btn-confirm" id="m-confirm">✅ تأكيد الشراء</button>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="page-header" data-aos="fade-down">
            <div style="display:flex;justify-content:space-between;align-items:center">
                <div>
                    <h1 style="font-size:1.5rem;font-weight:900"><span style="color:#dc2626">MASTER</span> X</h1>
                    <p style="font-size:.75rem;color:#555;margin-top:2px">اللينكات المنشورة 🔗</p>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <div class="bal-chip">
                        <span style="font-size:.8rem;font-weight:900;color:#fbbf24" id="user-bal">0</span>
                        <span style="font-size:.8rem">🪙</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ad top -->
        <div class="ad-strip" data-aos="fade-up" data-aos-delay="30">
            <script>atOptions = {'key':'d5a96c0fea5c0cae8f6c7dee54b39841','format':'iframe','height':60,'width':468,'params':{}};</script>
            <script src="https://www.highperformanceformat.com/d5a96c0fea5c0cae8f6c7dee54b39841/invoke.js"></script>
        </div>

        <!-- Search -->
        <div class="search-wrap" data-aos="fade-up" data-aos-delay="50">
            <span class="s-icon">🔍</span>
            <input type="text" class="search-input" id="search" placeholder="ابحث عن لينك..." oninput="filterLinks()">
        </div>

        <!-- Links -->
        <div id="links-container" data-aos="fade-up" data-aos-delay="80" style="display:flex;flex-direction:column;gap:11px">
            <div class="skel"></div>
            <div class="skel"></div>
            <div class="skel"></div>
        </div>

        <!-- Ad bottom -->
        <div class="ad-strip" style="margin-top:16px">
            <script>atOptions = {'key':'d5a96c0fea5c0cae8f6c7dee54b39841','format':'iframe','height':60,'width':468,'params':{}};</script>
            <script src="https://www.highperformanceformat.com/d5a96c0fea5c0cae8f6c7dee54b39841/invoke.js"></script>
        </div>
    </div>

    <nav>
        <a href="index.html"       class="nav-link">🏠<br>الرئيسية</a>
        <a href="games.html"       class="nav-link">🎮<br>الألعاب</a>
        <a href="hacks.html"       class="nav-link active">🔗<br>اللينكات</a>
        <a href="leaderboard.html" class="nav-link">🏆<br>الترتيب</a>
        <a href="settings.html"    class="nav-link">⚙️<br>الإعدادات</a>
    </nav>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        AOS.init({ duration:700, once:true, offset:30 });
        setTimeout(() => {
            const ls = document.getElementById('loading-screen');
            ls.style.opacity='0'; ls.style.visibility='hidden';
        }, 600);

        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyCd6mOpEJyiUSAAhmm2NbhT80MMY0UQJcc",
            databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com"
        }));

        const phone = localStorage.getItem('zeykor_phone');
        if (!phone) window.location.href = 'login.html';

        let userBalance = 0;
        let allLinks = [];
        let pendingLink = null;

        // Toast
        function toast(msg, t='g') {
            const el = document.getElementById('toast');
            el.textContent = msg; el.className = `toast show ${t}`;
            setTimeout(() => el.className = 'toast', 2500);
        }

        // Watch balance
        onValue(ref(db, `master_cheat/users/${phone}`), snap => {
            if (snap.exists()) {
                userBalance = snap.val().balance || 0;
                document.getElementById('user-bal').textContent = userBalance;
            }
        });

        // Listen to links
        onValue(ref(db, 'master_cheat/links'), snap => {
            allLinks = [];
            if (snap.exists()) {
                snap.forEach(item => allLinks.push({ id: item.key, ...item.val() }));
                allLinks.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }
            renderLinks(allLinks);
        });

        function renderLinks(links) {
            const box = document.getElementById('links-container');
            if (!links.length) {
                box.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#333"><div style="font-size:3rem;margin-bottom:12px">🔗</div><p>لا يوجد لينكات بعد</p></div>`;
                return;
            }

            const icons = { link:'🔗', tool:'🛠️', vip:'👑' };
            box.innerHTML = links.map((d, i) => {
                const ico = icons[d.type] || '🔗';
                const price = d.price || 0;
                const canAfford = userBalance >= price;
                const isFree = price === 0;

                const thumb = d.img
                    ? `<div class="thumb"><img src="${d.img}" alt="" onerror="this.parentElement.innerHTML='${ico}'"></div>`
                    : `<div class="thumb">${ico}</div>`;

                let priceHtml, actionHtml;
                if (isFree) {
                    priceHtml = `<span class="price-tag free">مجاني ✅</span>`;
                    actionHtml = `<div class="action-icon action-open">↗️</div>`;
                } else if (canAfford) {
                    priceHtml = `<span class="price-tag">${price} 🪙</span>`;
                    actionHtml = `<div class="action-icon action-open">🔓</div>`;
                } else {
                    priceHtml = `<span class="price-tag cant">${price} 🪙</span>`;
                    actionHtml = `<div class="action-icon action-poor">🔒</div>`;
                }

                return `
                    <div class="link-card ${!isFree && !canAfford ? 'locked' : ''}"
                         onclick="handleClick('${d.id}')"
                         data-aos="fade-up" data-aos-delay="${i * 40}"
                         style="opacity: ${!isFree && !canAfford ? '0.8' : '1'}">
                        ${thumb}
                        <div class="link-info">
                            <p class="link-title">${d.title}</p>
                            ${d.desc ? `<p class="link-desc">${d.desc}</p>` : ''}
                            <div style="margin-top:4px">${priceHtml}</div>
                        </div>
                        ${actionHtml}
                    </div>`;
            }).join('');
            AOS.refreshHard();
        }

        window.filterLinks = () => {
            const q = document.getElementById('search').value.toLowerCase().trim();
            renderLinks(q ? allLinks.filter(l =>
                l.title.toLowerCase().includes(q) ||
                (l.desc && l.desc.toLowerCase().includes(q))
            ) : allLinks);
        };

        // Handle click
        window.handleClick = (id) => {
            const link = allLinks.find(l => l.id === id);
            if (!link) return;
            const price = link.price || 0;

            if (price === 0) {
                window.open(link.url, '_blank');
                return;
            }

            if (userBalance < price) {
                toast(`❌ رصيدك ${userBalance} 🪙 — تحتاج ${price} 🪙`, 'r');
                return;
            }

            // Show modal
            pendingLink = link;
            const icons = { link:'🔗', tool:'🛠️', vip:'👑' };
            document.getElementById('m-icon').textContent = icons[link.type] || '🔗';
            document.getElementById('m-title').textContent = link.title;
            document.getElementById('m-desc').textContent  = link.desc || '';
            document.getElementById('m-price').textContent = `${price} 🪙`;
            document.getElementById('m-bal').textContent   = `رصيدك: ${userBalance} 🪙 ← سيصبح: ${userBalance - price} 🪙`;
            document.getElementById('m-confirm').onclick   = confirmPurchase;
            document.getElementById('modal').classList.add('show');
        };

        window.closeModal = () => {
            document.getElementById('modal').classList.remove('show');
            pendingLink = null;
        };

        async function confirmPurchase() {
            if (!pendingLink) return;
            const btn = document.getElementById('m-confirm');
            btn.disabled = true;
            btn.textContent = '⏳ جاري...';

            try {
                const snap = await get(ref(db, `master_cheat/users/${phone}`));
                const current = snap.val()?.balance || 0;
                const price = pendingLink.price || 0;

                if (current < price) {
                    toast('❌ الرصيد غير كافٍ', 'r');
                    closeModal(); return;
                }

                await update(ref(db, `master_cheat/users/${phone}`), { balance: current - price });
                closeModal();
                toast(`✅ تم الخصم! فُتح اللينك`);
                window.open(pendingLink.url, '_blank');
            } catch(e) {
                toast('❌ خطأ، حاول مجدداً', 'r');
            } finally {
                btn.disabled = false;
                btn.textContent = '✅ تأكيد الشراء';
            }
        }

        // Close modal on backdrop click
        document.getElementById('modal').addEventListener('click', e => {
            if (e.target === document.getElementById('modal')) closeModal();
        });

        // Animated background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const pts = Array.from({length:20}, () => ({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height,
            r: Math.random()*1.3+.4,
            vx: (Math.random()-.5)*.25, vy: (Math.random()-.5)*.25,
            a: Math.random()*.35+.1
        }));
        (function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pts.forEach(p => {
                p.x+=p.vx; p.y+=p.vy;
                if(p.x<0||p.x>canvas.width) p.vx*=-1;
                if(p.y<0||p.y>canvas.height) p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle=`rgba(220,38,38,${p.a})`; ctx.fill();
            });
            requestAnimationFrame(anim);
        })();
    </script>
</body>
