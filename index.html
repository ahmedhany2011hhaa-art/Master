    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module">
        AOS.init({ duration: 800, once: true, offset: 50 });

        import { listenToUserBalance, removeLoadingScreen, getCurrentUserPhone, database } from './js/firebase-config.js';
        import { ref, onValue, get, update } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        removeLoadingScreen();

        const phone = getCurrentUserPhone();
        if (!phone) throw new Error("User not logged in");

        listenToUserBalance((balance, userData) => {
            if (balance !== null) {
                document.getElementById('u-bal').innerText = balance;
                document.getElementById('u-id').innerText = userData.customID || `ID-${phone.slice(-4)}`;
                document.getElementById('u-level').innerText = "Level " + (Math.floor(balance / 1000) + 1);
                document.getElementById('u-nick').innerText = userData.nick || "User";
            } else {
                document.getElementById('u-id').innerText = "خطأ في التحميل";
            }
        });

        onValue(ref(database, 'master_cheat/users'), (snap) => {
            const preview = document.getElementById('leaderboard-preview');
            let users = [];
            snap.forEach(u => { let d = u.val(); d.phone = u.key; users.push(d); });
            users.sort((a, b) => (b.balance || 0) - (a.balance || 0));
            preview.innerHTML = "";
            users.slice(0, 3).forEach((u, i) => {
                const medals = ['🥇','🥈','🥉'];
                preview.innerHTML += `
                    <div class="flex justify-between items-center text-xs">
                        <div class="flex items-center gap-2">
                            <span>${medals[i]}</span>
                            <span>${u.nick || 'User'}</span>
                        </div>
                        <span class="text-yellow-500">${u.balance || 0} 🪙</span>
                    </div>`;
            });
        });

        window.showRewardAd = async (e) => {
            const btn = e.currentTarget;
            btn.style.opacity = '0.5'; btn.disabled = true;
            window.open("https://www.highperformanceformat.com/32bd0a6989d4de2e116826dfc2dc7749/invoke.js", '_blank');
            setTimeout(async () => {
                try {
                    const userRef = ref(database, `master_cheat/users/${phone}`);
                    const snap = await get(userRef);
                    if (snap.exists()) {
                        await update(userRef, { balance: (snap.val().balance || 0) + 50 });
                        alert("🎁 مبروك! تم إضافة 50 نقطة لرصيدك");
                    }
                } catch(err) { alert("حدث خطأ، يرجى المحاولة لاحقاً"); }
                finally { btn.style.opacity = '1'; btn.disabled = false; }
            }, 3000);
        };

        // Animated Background
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const pts = Array.from({length:30}, () => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                r: Math.random()*1.5+.5,
                vx: (Math.random()-.5)*.3, vy: (Math.random()-.5)*.3,
                a: Math.random()*.3+.1
            }));
            (function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                pts.forEach(p => {
                    p.x+=p.vx; p.y+=p.vy;
                    if(p.x<0||p.x>canvas.width) p.vx*=-1;
                    if(p.y<0||p.y>canvas.height) p.vy*=-1;
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                    ctx.fillStyle=`rgba(220,38,38,${p.a})`; ctx.fill();
                });
                requestAnimationFrame(draw);
            })();
        }
    </script>
