<!DOCTYPE html>

</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="p-4 pb-28">
        <header class="flex justify-between items-center mb-4">

                <span id="u-bal" class="text-yellow-500 font-bold">0</span> 🪙
            </div>
        </header>

        <div class="ad-slot">
            <script type="text/javascript">
                atOptions = {'key':'d5a96c0fea5c0cae8f6c7dee54b39841','format':'iframe','height':60,'width':468,'params':{}};
            </script>
            <script type="text/javascript" src="//www.highperformanceformat.com/d5a96c0fea5c0cae8f6c7dee54b39841/invoke.js"></script>
        </div>

        <div class="glass p-5 rounded-[2rem] mb-6 border-l-4 border-red-600 shadow-xl">
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">المعرف الرقمي الجديد</p>
            <p id="u-id" class="text-lg font-black text-white italic tracking-tighter">جاري المزامنة...</p>
            <div class="flex justify-between items-center mt-3 border-t border-white/5 pt-2">
                <p id="u-level" class="text-[10px] text-zinc-400">Level --</p>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="location.href='ads.html'" class="glass p-5 rounded-[2rem] text-center border-b-2 border-yellow-600">

            <button onclick="location.href='community.html'" class="glass p-5 rounded-[2rem] text-center border-b-2 border-blue-600">
                <span class="text-3xl block mb-1">💬</span>

    <nav>
        <a href="index.html" class="nav-link active">🏠<br>الرئيسية</a>

        <a href="settings.html" class="nav-link">⚙️<br>الإعدادات</a>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCd6mOpEJyiUSAAhmm2NbhT80MMY0UQJcc",
            databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const phone = localStorage.getItem('zeykor_phone');
        if(!phone) window.location.href="login.html";

        // المزامنة مع المسار الجديد master_cheat
        onValue(ref(db, `master_cheat/users/${phone}`), snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('u-bal').innerText = d.balance || 0;
                document.getElementById('u-id').innerText = d.customID || `ID-${phone.slice(-4)}`;
                document.getElementById('u-level').innerText = "Level " + (Math.floor((d.balance || 0)/1000) + 1);
                document.getElementById('u-nick').innerText = d.nick || "User";
            } else {
                document.getElementById('u-id').innerText = "سجل حساباً جديداً";
            }
        });

        // تأثير الخلفية
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let dots = [];
        for(let i=0; i<20; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: 0.2, vy: 0.2});
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(220,38,38,0.1)";
            dots.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                if(d.x>canvas.width) d.x=0; if(d.y>canvas.height) d.y=0;
                ctx.beginPath(); ctx.arc(d.x, d.y, 1, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
