<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>COMMUNITY | MASTER X ELITE</title>
    
    <!-- Tailwind + Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Emoji Picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.2/dist/emoji-picker-element.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            background: #030303;
            color: white;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #030303;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(220, 38, 38, 0.2);
            border-top: 4px solid #dc2626;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Main Container */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 0%, rgba(220,38,38,0.1), transparent 70%);
            position: relative;
        }
        
        /* Header */
        .glass-header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem;
            z-index: 50;
        }
        
        /* Tabs */
        .tabs-container {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3rem;
            margin: 0.5rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: transparent;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .tab-btn.active {
            background: #dc2626;
            color: white;
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3);
            transform: scale(1.02);
        }
        
        .tab-btn i {
            font-size: 1rem;
        }
        
        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }
        
        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        
        .chat-container::-webkit-scrollbar-track {
            background: #111;
        }
        
        .chat-container::-webkit-scrollbar-thumb {
            background: #dc2626;
            border-radius: 10px;
        }
        
        /* Message Bubbles */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            animation: messageAppear 0.3s ease;
        }
        
        @keyframes messageAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-bubble {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 1.5rem 1.5rem 1.5rem 0.3rem;
            padding: 0.8rem 1.2rem;
            max-width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }
        
        .message-bubble.own {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 1.5rem 1.5rem 0.3rem 1.5rem;
            align-self: flex-end;
            border-left: 2px solid #dc2626;
        }
        
        .message-sender {
            font-size: 0.7rem;
            color: #dc2626;
            font-weight: bold;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .message-sender i {
            font-size: 0.6rem;
            color: #666;
        }
        
        .message-time {
            font-size: 0.6rem;
            color: #666;
            margin-top: 0.3rem;
            text-align: left;
        }
        
        .message-text {
            font-size: 0.9rem;
            line-height: 1.4;
            word-break: break-word;
        }
        
        .message-text img.emoji {
            width: 1.2rem;
            height: 1.2rem;
            vertical-align: middle;
        }
        
        /* Input Area */
        .input-area {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem;
            z-index: 50;
        }
        
        .input-container {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 2rem;
            padding: 0.3rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 1rem;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        
        .message-input::placeholder {
            color: #444;
        }
        
        .emoji-btn, .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .emoji-btn {
            background: transparent;
            color: #666;
            font-size: 1.2rem;
        }
        
        .emoji-btn:hover {
            color: #eab308;
            transform: scale(1.1);
        }
        
        .send-btn {
            background: #dc2626;
            color: white;
            box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3);
        }
        
        .send-btn:hover {
            transform: scale(1.1);
        }
        
        .send-btn:active {
            transform: scale(0.9);
        }
        
        /* Emoji Picker */
        .emoji-picker-container {
            position: absolute;
            bottom: 80px;
            right: 20px;
            z-index: 1000;
            display: none;
            background: #1a1a1a;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Rooms Grid */
        .rooms-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }
        
        .room-card {
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s;
            cursor: pointer;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .room-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s ease;
        }
        
        .room-card:hover::before {
            left: 100%;
        }
        
        .room-card:active {
            transform: scale(0.95);
        }
        
        .room-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(220,38,38,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem;
            border: 2px solid #dc2626;
        }
        
        .room-name {
            font-weight: bold;
            margin-bottom: 0.3rem;
        }
        
        .room-members {
            font-size: 0.7rem;
            color: #666;
        }
        
        .room-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #22c55e;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 1rem;
            font-size: 0.6rem;
            font-weight: bold;
        }
        
        /* Create Room Button */
        .create-room-btn {
            background: linear-gradient(145deg, #2563eb, #1d4ed8);
            border: none;
            border-radius: 2rem;
            padding: 1rem;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .create-room-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37,99,235,0.3);
        }
        
        .create-room-btn:active {
            transform: translateY(0);
        }
        
        /* Online Users */
        .online-users {
            position: absolute;
            top: 80px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 0.3rem 1rem;
            border: 1px solid #22c55e/30;
            z-index: 40;
            font-size: 0.7rem;
            color: #22c55e;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .online-users i {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Typing Indicator */
        .typing-indicator {
            font-size: 0.7rem;
            color: #666;
            padding: 0.3rem 1rem;
            font-style: italic;
        }
        
        /* Admin Badge */
        .admin-badge {
            background: #eab308;
            color: black;
            padding: 0.1rem 0.3rem;
            border-radius: 0.3rem;
            font-size: 0.5rem;
            font-weight: bold;
            margin-left: 0.3rem;
        }
        
        /* Notification Badge */
        .notification-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #dc2626;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="glass-header flex justify-between items-center">
            <a href="index.html" class="text-2xl text-zinc-500 hover:text-red-600 transition-colors">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1 class="text-xl font-black">
                <span class="text-red-600">💬</span>
                <span class="text-white">المجتمع</span>
            </h1>
            <div class="w-10 h-10 rounded-full bg-red-600/20 flex items-center justify-center border border-red-600/30">
                <i class="fas fa-user text-red-500 text-sm"></i>
            </div>
        </div>

        <!-- Online Users Counter -->
        <div class="online-users">
            <i class="fas fa-circle text-[8px] text-green-500"></i>
            <span id="onlineCount">127</span> متصل الآن
        </div>

        <!-- Tabs -->
        <div class="tabs-container">
            <button id="tab-chat-btn" class="tab-btn active" onclick="switchTab('chat')">
                <i class="fas fa-comments"></i>
                الشات العام
            </button>
            <button id="tab-rooms-btn" class="tab-btn" onclick="switchTab('rooms')">
                <i class="fas fa-users"></i>
                الرومات
                <span class="notification-badge" id="roomsNotif" style="display: none;">3</span>
            </button>
        </div>

        <!-- Chat Tab -->
        <div id="chat-tab" class="flex-1 flex flex-col">
            <!-- Messages Container -->
            <div class="chat-container" id="chatMessages"></div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typingIndicator"></div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <button class="emoji-btn" onclick="toggleEmojiPicker()">
                        <i class="far fa-smile"></i>
                    </button>
                    <input type="text" id="messageInput" class="message-input" placeholder="اكتب رسالتك..." maxlength="500">
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Rooms Tab (Hidden by default) -->
        <div id="rooms-tab" class="flex-1" style="display: none;">
            <!-- Create Room Button -->
            <button class="create-room-btn" onclick="createRoom()">
                <i class="fas fa-plus-circle"></i>
                إنشاء روم جديد
            </button>

            <!-- Rooms Grid -->
            <div class="rooms-container" id="roomsGrid"></div>
        </div>

        <!-- Emoji Picker -->
        <div class="emoji-picker-container" id="emojiPicker">
            <emoji-picker></emoji-picker>
        </div>
    </div>

    <!-- Create Room Modal -->
    <div id="createRoomModal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[9999] hidden items-center justify-center p-6">
        <div class="bg-zinc-900 rounded-[2rem] p-6 max-w-sm border border-red-600/30">
            <h2 class="text-xl font-black text-red-600 mb-4">🏠 إنشاء روم جديد</h2>
            <input type="text" id="roomName" placeholder="اسم الروم" class="w-full bg-black/50 p-4 rounded-2xl mb-4 border border-white/10 outline-none focus:border-red-600">
            <input type="text" id="roomPassword" placeholder="كلمة السر (اختياري)" class="w-full bg-black/50 p-4 rounded-2xl mb-4 border border-white/10 outline-none focus:border-red-600">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <select id="roomType" class="bg-black/50 p-3 rounded-xl border border-white/10">
                    <option value="public">عام</option>
                    <option value="private">خاص</option>
                </select>
                <input type="number" id="roomMaxMembers" placeholder="الحد الأقصى" class="bg-black/50 p-3 rounded-xl border border-white/10" value="50">
            </div>
            <button onclick="createRoomConfirm()" class="w-full bg-red-600 p-4 rounded-2xl font-black">إنشاء</button>
            <button onclick="hideCreateRoomModal()" class="w-full bg-transparent p-4 rounded-2xl font-black mt-2 border border-white/10">إلغاء</button>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.2/dist/emoji-picker-element.min.js"></script>
    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, serverTimestamp, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // Firebase Config
        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyCd6mOpEJyiUSAAhmm2NbhT80MMY0UQJcc",
            databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com"
        }));

        // User Data
        const phone = localStorage.getItem('zeykor_phone');
        if(!phone) window.location.href = "login.html";

        let myData = {
            nick: 'User',
            id: 'ID-0000',
            isAdmin: false,
            isOnline: true
        };

        let typingTimeout = null;
        let currentTab = 'chat';

        // Load user data
        onValue(ref(db, `master_cheat/users/${phone}`), (snap) => {
            const d = snap.val();
            if(d) {
                myData.nick = d.nick || 'User';
                myData.id = d.customID || `ID-${phone.slice(-4)}`;
                myData.isAdmin = d.isAdmin || false;
                
                // Update online status
                update(ref(db, `ZEYKOR/online/${phone}`), {
                    nick: myData.nick,
                    id: myData.id,
                    lastSeen: serverTimestamp(),
                    online: true
                });
            }
        });

        // Set online status on disconnect
        window.addEventListener('beforeunload', () => {
            update(ref(db, `ZEYKOR/online/${phone}`), { online: false });
        });

        // Load chat messages
        const chatMessages = document.getElementById('chatMessages');
        onValue(ref(db, 'ZEYKOR/chat'), (snap) => {
            chatMessages.innerHTML = '';
            
            const messages = [];
            snap.forEach((msg) => {
                messages.push({ key: msg.key, ...msg.val() });
            });
            
            // Sort by time
            messages.sort((a, b) => (a.time || 0) - (b.time || 0));
            
            messages.forEach((msg) => {
                const isOwn = msg.id === myData.id;
     
                const wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper';
                wrapper.style.alignItems = isOwn ? 'flex-end' : 'flex-start';
                const bubble = document.createElement('div');
                bubble.className = 'message-bubble' + (isOwn ? ' own' : '');
                if(!isOwn) {
                    bubble.innerHTML = `<div class="message-sender">${msg.nick || 'User'}${msg.isAdmin ? '<span class="admin-badge">ADMIN</span>' : ''}</div>`;
                }
                const textEl = document.createElement('div');
                textEl.className = 'message-text';
                textEl.textContent = msg.text || '';
                const timeEl = document.createElement('div');
                timeEl.className = 'message-time';
                timeEl.textContent = msg.time ? new Date(msg.time).toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}) : '';
                bubble.appendChild(textEl);
                bubble.appendChild(timeEl);
                wrapper.appendChild(bubble);
                chatMessages.appendChild(wrapper);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });

        // Online counter
        onValue(ref(db, 'ZEYKOR/online'), (snap) => {
            let count = 0;
            snap.forEach(u => { if(u.val().online) count++; });
            document.getElementById('onlineCount').textContent = Math.max(count, 1);
        });

        // Send message
        window.sendMessage = async () => {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if(!text || text.length > 500) return;
            input.value = '';
            try {
                await push(ref(db, 'ZEYKOR/chat'), {
                    nick: myData.nick,
                    id: myData.id,
                    text,
                    isAdmin: myData.isAdmin,
                    time: Date.now()
                });
            } catch(e) { console.error(e); }
        };

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

        // Tab switching
        window.switchTab = (tab) => {
            currentTab = tab;
            document.getElementById('chat-tab').style.display = tab === 'chat' ? 'flex' : 'none';
            document.getElementById('rooms-tab').style.display = tab === 'rooms' ? 'flex' : 'none';
            document.getElementById('tab-chat-btn').classList.toggle('active', tab === 'chat');
            document.getElementById('tab-rooms-btn').classList.toggle('active', tab === 'rooms');
            if(tab === 'rooms') loadRooms();
        };

        // Rooms
        function loadRooms() {
            const grid = document.getElementById('roomsGrid');
            const sampleRooms = [
                { name: 'الغرفة العامة', icon: '🌍', members: 42, type: 'public' },
                { name: 'ترفيه وألعاب', icon: '🎮', members: 28, type: 'public' },
                { name: 'VIP فقط', icon: '👑', members: 15, type: 'private' },
                { name: 'نقاشات', icon: '💬', members: 33, type: 'public' },
            ];
            grid.innerHTML = '';
            sampleRooms.forEach(room => {
                grid.innerHTML += `
                    <div class="room-card" onclick="joinRoom('${room.name}')">
                        <span class="room-badge">${room.type === 'private' ? '🔒' : '🌐'}</span>
                        <div class="room-icon">${room.icon}</div>
                        <div class="room-name">${room.name}</div>
                        <div class="room-members">${room.members} عضو</div>
                    </div>`;
            });
        }

        window.joinRoom = (name) => { alert('الانضمام إلى غرفة: ' + name); };
        window.createRoom = () => { document.getElementById('createRoomModal').style.display = 'flex'; };
        window.hideCreateRoomModal = () => { document.getElementById('createRoomModal').style.display = 'none'; };
        window.createRoomConfirm = () => {
            const name = document.getElementById('roomName').value.trim();
            if(!name) return;
            alert('تم إنشاء الغرفة: ' + name);
            hideCreateRoomModal();
        };

        // Emoji picker
        window.toggleEmojiPicker = () => {
            const picker = document.getElementById('emojiPicker');
            picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
        };

        document.addEventListener('emoji-click', (e) => {
            document.getElementById('messageInput').value += e.detail?.unicode || '';
            document.getElementById('emojiPicker').style.display = 'none';
        });

        // Hide loading screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                const ls = document.getElementById('loading-screen');
                if(ls) { ls.style.opacity = '0'; ls.style.visibility = 'hidden'; }
            }, 600);
        });
    </script>
</body>
</html>
