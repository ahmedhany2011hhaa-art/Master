<!DOCTYPE html>
<html lang="ar" dir="rtl">

<body class="p-6">

            <button onclick="register()" class="w-full p-4 rounded-2xl bg-green-600 font-black">إنشاء الآن</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

        const db = getDatabase(initializeApp({
            apiKey: "AIzaSyCd6mOpEJyiUSAAhmm2NbhT80MMY0UQJcc",
            databaseURL: "https://project-fe025bb5-b1cc-4b8f-93e-default-rtdb.firebaseio.com"
        }));

        window.register = async () => {
            const p = document.getElementById('phone').value;
            const n = document.getElementById('nick').value;
            const ps = document.getElementById('pass').value;

            const snap = await get(ref(db, `master_cheat/users/${p}`));
            if(snap.exists()) return alert("الرقم مسجل مسبقاً!");

            await set(ref(db, `master_cheat/users/${p}`), {
                nick: n, pass: ps, balance: 500,
                customID: `MC-${Math.floor(1000 + Math.random()*8999)}`
            });
